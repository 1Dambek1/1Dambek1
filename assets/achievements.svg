<svg width="1200" height="330" viewBox="0 0 1200 330" fill="none" xmlns="http://www.w3.org/2000/svg">
  <title>Achievement highlights</title>
  <defs>
    <linearGradient id="cardBg" x1="0" y1="0" x2="1200" y2="330" gradientUnits="userSpaceOnUse">
      <stop stop-color="#080A10"/>
      <stop offset="0.52" stop-color="#10121A"/>
      <stop offset="1" stop-color="#071513"/>
    </linearGradient>
    <linearGradient id="accent" x1="86" y1="52" x2="1110" y2="280" gradientUnits="userSpaceOnUse">
      <stop stop-color="#22D3EE"/>
      <stop offset="0.36" stop-color="#A78BFA"/>
      <stop offset="0.72" stop-color="#34D399"/>
      <stop offset="1" stop-color="#FBBF24"/>
    </linearGradient>
    <pattern id="dots" width="24" height="24" patternUnits="userSpaceOnUse">
      <circle cx="2" cy="2" r="1.2" fill="#FFFFFF" fill-opacity="0.07"/>
    </pattern>
    <filter id="glow" x="-20%" y="-20%" width="140%" height="140%" color-interpolation-filters="sRGB">
      <feGaussianBlur stdDeviation="10" result="blur"/>
      <feColorMatrix in="blur" type="matrix" values="0 0 0 0 0.13 0 0 0 0 0.83 0 0 0 0 0.93 0 0 0 0.38 0"/>
      <feBlend in="SourceGraphic"/>
    </filter>
  </defs>

  <rect width="1200" height="330" rx="28" fill="url(#cardBg)"/>
  <rect width="1200" height="330" rx="28" fill="url(#dots)"/>
  <path d="M54 76H1146" stroke="url(#accent)" stroke-width="2" stroke-opacity="0.7"/>
  <path d="M54 77H1146" stroke="url(#accent)" stroke-width="10" stroke-opacity="0.14" filter="url(#glow)"/>

  <text x="54" y="50" font-family="Inter, Segoe UI, Arial, sans-serif" font-size="24" font-weight="900" fill="#FFFFFF">Achievement highlights</text>
  <text x="334" y="50" font-family="Inter, Segoe UI, Arial, sans-serif" font-size="16" fill="#8EA3B7">selected wins, finals, and product work</text>

  <g font-family="Inter, Segoe UI, Arial, sans-serif">
    <rect x="54" y="106" width="338" height="72" rx="18" fill="#0E1420" stroke="#22D3EE" stroke-opacity="0.22"/>
    <text x="78" y="138" font-size="18" font-weight="800" fill="#E8FCFF">Data Fusion 2026</text>
    <text x="78" y="162" font-size="15" fill="#9CA3AF">special nomination winner</text>

    <rect x="431" y="106" width="338" height="72" rx="18" fill="#0E1420" stroke="#34D399" stroke-opacity="0.22"/>
    <text x="455" y="138" font-size="18" font-weight="800" fill="#E9FFF5">NTO 2025/26-2026</text>
    <text x="455" y="162" font-size="15" fill="#9CA3AF">absolute winner + FinTech/AI finalist</text>

    <rect x="808" y="106" width="338" height="72" rx="18" fill="#0E1420" stroke="#A78BFA" stroke-opacity="0.22"/>
    <text x="832" y="138" font-size="18" font-weight="800" fill="#F4EFFF">IO 2026 / DANO 2025</text>
    <text x="832" y="162" font-size="15" fill="#9CA3AF">prize-winner and finalist</text>

    <rect x="54" y="204" width="338" height="72" rx="18" fill="#0E1420" stroke="#FBBF24" stroke-opacity="0.22"/>
    <text x="78" y="236" font-size="18" font-weight="800" fill="#FFF6D1">Hackathons</text>
    <text x="78" y="260" font-size="15" fill="#9CA3AF">Tulahack, Codewars, Smolathon winner + prizes</text>

    <rect x="431" y="204" width="338" height="72" rx="18" fill="#0E1420" stroke="#FB7185" stroke-opacity="0.22"/>
    <text x="455" y="236" font-size="18" font-weight="800" fill="#FFE5EB">Sirius AI / AI Olympiad</text>
    <text x="455" y="260" font-size="15" fill="#9CA3AF">AI assistant, product client, semifinalist</text>

    <rect x="808" y="204" width="338" height="72" rx="18" fill="#0E1420" stroke="#FFFFFF" stroke-opacity="0.14"/>
    <text x="832" y="236" font-size="18" font-weight="800" fill="#F8FAFC">VSOSH Regionals</text>
    <text x="832" y="260" font-size="15" fill="#9CA3AF">physics, CS, chemistry, math - 2023-2025</text>
  </g>
</svg>
