<svg width="1200" height="210" viewBox="0 0 1200 210" fill="none" xmlns="http://www.w3.org/2000/svg">
  <title>Animated AI signal line</title>
  <defs>
    <linearGradient id="signal" x1="105" y1="105" x2="1095" y2="105" gradientUnits="userSpaceOnUse">
      <stop stop-color="#38BDF8"/>
      <stop offset="0.32" stop-color="#A78BFA"/>
      <stop offset="0.66" stop-color="#34D399"/>
      <stop offset="1" stop-color="#F59E0B"/>
    </linearGradient>
    <linearGradient id="bg" x1="0" y1="0" x2="1200" y2="210" gradientUnits="userSpaceOnUse">
      <stop stop-color="#020617"/>
      <stop offset="0.36" stop-color="#0F172A"/>
      <stop offset="0.72" stop-color="#111827"/>
      <stop offset="1" stop-color="#052E2B"/>
    </linearGradient>
    <radialGradient id="blueGlow" cx="0" cy="0" r="1" gradientUnits="userSpaceOnUse" gradientTransform="translate(260 52) rotate(90) scale(150 320)">
      <stop stop-color="#38BDF8" stop-opacity="0.42"/>
      <stop offset="1" stop-color="#38BDF8" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="violetGlow" cx="0" cy="0" r="1" gradientUnits="userSpaceOnUse" gradientTransform="translate(570 146) rotate(90) scale(130 260)">
      <stop stop-color="#A78BFA" stop-opacity="0.32"/>
      <stop offset="1" stop-color="#A78BFA" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="greenGlow" cx="0" cy="0" r="1" gradientUnits="userSpaceOnUse" gradientTransform="translate(950 150) rotate(90) scale(150 340)">
      <stop stop-color="#34D399" stop-opacity="0.38"/>
      <stop offset="1" stop-color="#34D399" stop-opacity="0"/>
    </radialGradient>
    <pattern id="grid" width="38" height="38" patternUnits="userSpaceOnUse">
      <path d="M38 0H0V38" stroke="#FFFFFF" stroke-opacity="0.045" stroke-width="1"/>
    </pattern>
    <filter id="glow" x="-10%" y="-80%" width="120%" height="260%" color-interpolation-filters="sRGB">
      <feGaussianBlur stdDeviation="9" result="blur"/>
      <feColorMatrix in="blur" type="matrix" values="0 0 0 0 0.23 0 0 0 0 0.74 0 0 0 0 0.97 0 0 0 0.5 0"/>
      <feBlend in="SourceGraphic"/>
    </filter>
    <style>
      @keyframes dash {
        from { stroke-dashoffset: 0; }
        to { stroke-dashoffset: -112; }
      }
      @keyframes pulse {
        0%, 100% { r: 5; opacity: .48; }
        50% { r: 9; opacity: 1; }
      }
      @keyframes scan {
        0% { transform: translateX(-260px); opacity: 0; }
        12% { opacity: .95; }
        88% { opacity: .95; }
        100% { transform: translateX(260px); opacity: 0; }
      }
      #dash {
        stroke-dasharray: 22 34;
        animation: dash 1.55s linear infinite;
      }
      .node {
        animation: pulse 2.15s ease-in-out infinite;
      }
      .node.two { animation-delay: .35s; }
      .node.three { animation-delay: .7s; }
      .scan {
        animation: scan 4.3s ease-in-out infinite;
        transform-origin: center;
      }
    </style>
  </defs>

  <rect width="1200" height="210" rx="28" fill="url(#bg)"/>
  <rect width="1200" height="210" rx="28" fill="url(#grid)"/>
  <rect width="1200" height="210" rx="28" fill="url(#blueGlow)"/>
  <rect width="1200" height="210" rx="28" fill="url(#violetGlow)"/>
  <rect width="1200" height="210" rx="28" fill="url(#greenGlow)"/>

  <path d="M100 111H300C334 111 350 58 384 58H512C548 58 562 152 598 152H722C758 152 774 76 810 76H1100" stroke="#475569" stroke-width="2"/>
  <path id="dash" d="M100 111H300C334 111 350 58 384 58H512C548 58 562 152 598 152H722C758 152 774 76 810 76H1100" stroke="url(#signal)" stroke-width="4" stroke-linecap="round" filter="url(#glow)"/>

  <g class="scan">
    <rect x="494" y="58" width="212" height="94" rx="47" fill="#38BDF8" fill-opacity="0.1"/>
    <path d="M530 105H670" stroke="#E2E8F0" stroke-opacity="0.4" stroke-width="1.4"/>
  </g>

  <circle class="node" cx="384" cy="58" r="6" fill="#38BDF8"/>
  <circle class="node two" cx="598" cy="152" r="6" fill="#A78BFA"/>
  <circle class="node three" cx="810" cy="76" r="6" fill="#34D399"/>

  <g font-family="Inter, Segoe UI, Arial, sans-serif" font-weight="900">
    <rect x="92" y="48" width="118" height="40" rx="20" fill="#0F172A" stroke="#38BDF8" stroke-opacity="0.5"/>
    <text x="151" y="74" text-anchor="middle" font-size="16" fill="#E0F2FE">MODEL</text>
    <rect x="432" y="124" width="76" height="36" rx="18" fill="#1E293B" stroke="#38BDF8" stroke-opacity="0.38"/>
    <text x="470" y="148" text-anchor="middle" font-size="15" fill="#BAE6FD">PY</text>
    <rect x="526" y="124" width="76" height="36" rx="18" fill="#1E293B" stroke="#A78BFA" stroke-opacity="0.38"/>
    <text x="564" y="148" text-anchor="middle" font-size="15" fill="#E9D5FF">TS</text>
    <rect x="692" y="46" width="78" height="36" rx="18" fill="#1E293B" stroke="#34D399" stroke-opacity="0.38"/>
    <text x="731" y="70" text-anchor="middle" font-size="15" fill="#BBF7D0">ML</text>
    <rect x="988" y="118" width="120" height="40" rx="20" fill="#0F172A" stroke="#34D399" stroke-opacity="0.5"/>
    <text x="1048" y="144" text-anchor="middle" font-size="16" fill="#DCFCE7">PRODUCT</text>
  </g>
</svg>
