<svg width="1200" height="140" viewBox="0 0 1200 140" fill="none" xmlns="http://www.w3.org/2000/svg">
  <title>Animated AI signal line</title>
  <defs>
    <linearGradient id="signal" x1="90" y1="60" x2="1110" y2="60" gradientUnits="userSpaceOnUse">
      <stop stop-color="#38BDF8"/>
      <stop offset="0.36" stop-color="#A78BFA"/>
      <stop offset="0.68" stop-color="#34D399"/>
      <stop offset="1" stop-color="#F59E0B"/>
    </linearGradient>
    <linearGradient id="fade" x1="0" y1="0" x2="1200" y2="140" gradientUnits="userSpaceOnUse">
      <stop stop-color="#020617"/>
      <stop offset="0.34" stop-color="#0F172A"/>
      <stop offset="0.72" stop-color="#111827"/>
      <stop offset="1" stop-color="#052E2B"/>
    </linearGradient>
    <radialGradient id="blueGlow" cx="0" cy="0" r="1" gradientUnits="userSpaceOnUse" gradientTransform="translate(250 24) rotate(90) scale(110 260)">
      <stop stop-color="#38BDF8" stop-opacity="0.38"/>
      <stop offset="1" stop-color="#38BDF8" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="greenGlow" cx="0" cy="0" r="1" gradientUnits="userSpaceOnUse" gradientTransform="translate(930 112) rotate(90) scale(120 310)">
      <stop stop-color="#34D399" stop-opacity="0.34"/>
      <stop offset="1" stop-color="#34D399" stop-opacity="0"/>
    </radialGradient>
    <filter id="glow" x="-10%" y="-60%" width="120%" height="220%" color-interpolation-filters="sRGB">
      <feGaussianBlur stdDeviation="7" result="blur"/>
      <feColorMatrix in="blur" type="matrix" values="0 0 0 0 0.23 0 0 0 0 0.74 0 0 0 0 0.97 0 0 0 0.4 0"/>
      <feBlend in="SourceGraphic"/>
    </filter>
    <style>
      @keyframes dash {
        from { stroke-dashoffset: 0; }
        to { stroke-dashoffset: -96; }
      }
      @keyframes pulse {
        0%, 100% { r: 4; opacity: .45; }
        50% { r: 7; opacity: 1; }
      }
      @keyframes scan {
        0% { transform: translateX(-220px); opacity: 0; }
        12% { opacity: .9; }
        88% { opacity: .9; }
        100% { transform: translateX(220px); opacity: 0; }
      }
      #dash {
        stroke-dasharray: 18 30;
        animation: dash 1.6s linear infinite;
      }
      .node {
        animation: pulse 2.2s ease-in-out infinite;
      }
      .node.two { animation-delay: .35s; }
      .node.three { animation-delay: .7s; }
      .scan {
        animation: scan 4.5s ease-in-out infinite;
        transform-origin: center;
      }
    </style>
  </defs>

  <rect width="1200" height="140" rx="22" fill="url(#fade)"/>
  <rect width="1200" height="140" rx="22" fill="url(#blueGlow)"/>
  <rect width="1200" height="140" rx="22" fill="url(#greenGlow)"/>
  <path d="M90 72H318C344 72 356 42 382 42H518C544 42 556 96 582 96H726C752 96 764 56 790 56H1110" stroke="#475569" stroke-width="1.5"/>
  <path id="dash" d="M90 72H318C344 72 356 42 382 42H518C544 42 556 96 582 96H726C752 96 764 56 790 56H1110" stroke="url(#signal)" stroke-width="2.8" stroke-linecap="round" filter="url(#glow)"/>
  <g class="scan">
    <rect x="510" y="34" width="180" height="72" rx="36" fill="#38BDF8" fill-opacity="0.08"/>
    <path d="M536 70H664" stroke="#E2E8F0" stroke-opacity="0.34" stroke-width="1"/>
  </g>
  <circle class="node" cx="382" cy="42" r="5" fill="#38BDF8"/>
  <circle class="node two" cx="582" cy="96" r="5" fill="#A78BFA"/>
  <circle class="node three" cx="790" cy="56" r="5" fill="#34D399"/>
  <rect x="92" y="28" width="78" height="26" rx="13" fill="#0F172A" stroke="#38BDF8" stroke-opacity="0.45"/>
  <text x="131" y="46" text-anchor="middle" font-family="Inter, Segoe UI, Arial, sans-serif" font-size="12" font-weight="800" fill="#E0F2FE">MODEL</text>
  <rect x="1010" y="84" width="96" height="26" rx="13" fill="#0F172A" stroke="#34D399" stroke-opacity="0.45"/>
  <text x="1058" y="102" text-anchor="middle" font-family="Inter, Segoe UI, Arial, sans-serif" font-size="12" font-weight="800" fill="#DCFCE7">PRODUCT</text>
  <g font-family="Inter, Segoe UI, Arial, sans-serif" font-size="12" font-weight="800">
    <rect x="420" y="82" width="46" height="24" rx="12" fill="#1E293B" stroke="#38BDF8" stroke-opacity="0.35"/>
    <text x="443" y="99" text-anchor="middle" fill="#BAE6FD">PY</text>
    <rect x="484" y="82" width="46" height="24" rx="12" fill="#1E293B" stroke="#A78BFA" stroke-opacity="0.35"/>
    <text x="507" y="99" text-anchor="middle" fill="#E9D5FF">TS</text>
    <rect x="700" y="28" width="46" height="24" rx="12" fill="#1E293B" stroke="#34D399" stroke-opacity="0.35"/>
    <text x="723" y="45" text-anchor="middle" fill="#BBF7D0">ML</text>
  </g>
</svg>
