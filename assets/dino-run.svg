<svg width="900" height="150" viewBox="0 0 900 150" fill="none" xmlns="http://www.w3.org/2000/svg">
  <title>Running dino animation</title>
  <defs>
    <style>
      .muted { stroke: #6b7280; }
      .accent { fill: #38bdf8; }
      .soft { fill: #94a3b8; }
      .chip { fill: #111827; stroke: #334155; }
      @keyframes dash {
        from { stroke-dashoffset: 0; }
        to { stroke-dashoffset: -64; }
      }
      @keyframes float {
        0%, 100% { transform: translateY(0); }
        50% { transform: translateY(-4px); }
      }
      @keyframes blink {
        0%, 78%, 100% { opacity: 1; }
        80%, 84% { opacity: 0.2; }
      }
      @keyframes pulse {
        0%, 100% { opacity: 0.45; }
        50% { opacity: 1; }
      }
      #track {
        stroke-dasharray: 24 40;
        animation: dash 1.1s linear infinite;
      }
      #dino {
        animation: float 0.46s ease-in-out infinite;
        transform-origin: center;
      }
      #eye {
        animation: blink 3.2s infinite;
      }
      .node {
        animation: pulse 1.8s ease-in-out infinite;
      }
      .node:nth-of-type(2) { animation-delay: 0.25s; }
      .node:nth-of-type(3) { animation-delay: 0.5s; }
    </style>
  </defs>

  <line x1="44" y1="111" x2="856" y2="111" class="muted" stroke-opacity="0.45" stroke-width="2"/>
  <line id="track" x1="44" y1="111" x2="856" y2="111" stroke="#38bdf8" stroke-opacity="0.75" stroke-width="2" stroke-linecap="round"/>

  <g opacity="0.9">
    <rect x="592" y="44" width="82" height="30" rx="15" class="chip"/>
    <text x="633" y="64" text-anchor="middle" font-family="Inter, Segoe UI, Arial, sans-serif" font-size="12" font-weight="700" fill="#cbd5e1">model</text>
    <rect x="694" y="44" width="58" height="30" rx="15" class="chip"/>
    <text x="723" y="64" text-anchor="middle" font-family="Inter, Segoe UI, Arial, sans-serif" font-size="12" font-weight="700" fill="#cbd5e1">api</text>
    <rect x="772" y="44" width="70" height="30" rx="15" class="chip"/>
    <text x="807" y="64" text-anchor="middle" font-family="Inter, Segoe UI, Arial, sans-serif" font-size="12" font-weight="700" fill="#cbd5e1">client</text>
    <circle class="node" cx="684" cy="59" r="3" fill="#38bdf8"/>
    <circle class="node" cx="762" cy="59" r="3" fill="#a78bfa"/>
    <circle class="node" cx="852" cy="59" r="3" fill="#34d399"/>
    <path d="M674 59H694M752 59H772M842 59H856" stroke="#64748b" stroke-width="1.5" stroke-linecap="round"/>
  </g>

  <g id="dino" transform="translate(105 0)">
    <rect x="42" y="63" width="42" height="34" rx="5" class="accent"/>
    <rect x="74" y="49" width="34" height="25" rx="5" class="accent"/>
    <rect x="98" y="58" width="15" height="9" rx="2" class="accent"/>
    <rect x="37" y="73" width="12" height="11" rx="3" fill="#0f172a"/>
    <rect id="eye" x="95" y="57" width="5" height="5" rx="1.5" fill="#0f172a"/>
    <rect x="50" y="96" width="10" height="18" rx="3" class="accent">
      <animate attributeName="height" values="18;12;18" dur="0.46s" repeatCount="indefinite"/>
      <animate attributeName="y" values="96;102;96" dur="0.46s" repeatCount="indefinite"/>
    </rect>
    <rect x="74" y="96" width="10" height="18" rx="3" class="accent">
      <animate attributeName="height" values="12;18;12" dur="0.46s" repeatCount="indefinite"/>
      <animate attributeName="y" values="102;96;102" dur="0.46s" repeatCount="indefinite"/>
    </rect>
    <path d="M43 79C25 77 18 66 14 55" stroke="#38bdf8" stroke-width="8" stroke-linecap="round"/>
    <path d="M82 82H94" stroke="#0f172a" stroke-opacity="0.55" stroke-width="4" stroke-linecap="round"/>
  </g>

  <g class="soft" opacity="0.72">
    <rect x="444" y="83" width="7" height="28" rx="3"/>
    <rect x="433" y="95" width="29" height="7" rx="3"/>
    <rect x="457" y="74" width="7" height="37" rx="3"/>
    <rect x="826" y="86" width="6" height="25" rx="3"/>
    <rect x="816" y="96" width="25" height="6" rx="3"/>
  </g>
</svg>
